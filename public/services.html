<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Services - Universal Services</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="navbar"></div>

<section class="section">
  <h2>All Our Services</h2>
  <p class="subhead">Browse 65 services across 11 categories</p>

  <input type="text" id="search" class="search-inline" placeholder="Search by service name...">

  <div class="filters" id="filters"></div>
  <div class="count-info" id="count-info"></div>

  <div class="grid" id="grid"></div>
</section>

<div id="footer"></div>

<script src="services-data.js"></script>
<script src="app.js"></script>
<script>
  renderNavbar('services');
  renderFooter();

  let activeCat = 'All';
  let query = '';

  const params = new URLSearchParams(window.location.search);
  if (params.get('q')) {
    query = params.get('q');
    document.getElementById('search').value = query;
  }

  document.getElementById('filters').innerHTML = CATEGORIES.map(c =>
    `<button class="filter-btn ${c==='All'?'active':''}" data-cat="${c}">${c}</button>`
  ).join('');

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    query = e.target.value.trim();
    render();
  });

  function render() {
    const q = query.toLowerCase();
    const filtered = SERVICES.filter(s => {
      const okCat = activeCat === 'All' || s.category === activeCat;
      const okQ = !q || s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q);
      return okCat && okQ;
    });
    const grid = document.getElementById('grid');
    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">No services found. Try a different search.</div>`;
    } else {
      grid.innerHTML = filtered.map(serviceCardHTML).join('');
    }
    document.getElementById('count-info').textContent = `Showing ${filtered.length} of ${SERVICES.length} services`;
  }
  render();
</script>
</body>
</html>
