<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Universal Services</title>
<link rel="icon" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="navbar"></div>

<div class="form-wrap">
  <h2>Welcome Back</h2>
  <p class="subhead">Login to your account</p>
  <div id="success" class="success-msg" style="display:none;">Registration successful! Please login.</div>
  <form id="login-form">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
      <button type="button" class="toggle-pw" onclick="togglePw()">Show</button>
    </div>
    <div class="error-msg" id="err"></div>
    <button type="submit" class="btn" style="width:100%;">Login</button>
    <p class="form-foot">Don't have an account? <a href="register.html">Register here</a></p>
    <p class="form-foot"><a href="admin.html">Admin Login</a></p>
  </form>
</div>

<div id="footer"></div>

<script src="app.js"></script>
<script>
  renderNavbar();
  renderFooter();

  if (new URLSearchParams(window.location.search).get('registered')) {
    document.getElementById('success').style.display = 'block';
  }

  function togglePw() {
    const i = document.getElementById('password');
    const btn = document.querySelector('.toggle-pw');
    const isPw = i.type === 'password';
    i.type = isPw ? 'text' : 'password';
    btn.textContent = isPw ? 'Hide' : 'Show';
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    err.textContent = '';
    if (!email || !password) return err.textContent = 'Email and password required';
    const r = await api('/api/login', { method: 'POST', body: { email, password } });
    if (!r.ok) return err.textContent = r.data.error || 'Login failed';
    window.location.href = 'dashboard.html';
  });
</script>
</body>
</html>
